<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Your Fitness Coach</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="chat-container">
    <h1>Your Fitness Coach</h1>
    <p class="subtitle">Ask me about workouts, training, cardio, mobility, or general fitness.</p>

    <section id="chat-box" class="chat-box">
        <div class="bot-message">
    Hi! I’m your fitness assistant. Ask me for a beginner workout, exercise explanation, or training advice.
        </div>
    </section>

    <section class="input-area">
        <input
        id="user-input"
        type="text"
        placeholder="Ask a fitness question..."
        />
        <button id="send-btn">Send</button>
    </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
